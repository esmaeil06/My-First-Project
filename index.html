<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="   viewport" content="width=device-width,initial-scale=1" />
    <title>Mini Shop</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="logo">Mini Shop</div>
            <div class="search">
                <input id="search" type="search" placeholder="Search products..." />
            </div>
            <button id="cartBtn" class="cart-btn">Cart (<span id="cart-count">0</span>)</button>
        </div>
    </header>

    <main class="container">
        <section id="products" class="products-grid" aria-label="Products"></section>
    </main>

    <aside id="cart" class="cart-drawer hidden" aria-hidden="true">
        <button id="closeCart" class="close-cart" aria-label="Close cart">×</button>
        <h2>Your Cart</h2>
        <ul id="cart-items" class="cart-items"></ul>
        <div class="cart-footer">
            <div>Total: <strong id="cart-total">$0.00</strong></div>
            <button id="checkout" class="btn primary">Checkout</button>
        </div>
    </aside>

    <script src="app.js"></script>
</body>
</html>
